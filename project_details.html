<h2 class="font-headline-md text-headline-md text-primary mb-8">The Challenge</h2>
<div class="prose max-w-none font-body-lg text-body-lg text-text-main space-y-6 leading-relaxed">
<p>
                            Modern Unmanned Aerial Vehicles (UAVs) rely heavily on Global Positioning Systems (GPS) for navigation and stabilization. However, in environments such as dense urban canyons, underground facilities, or heavily forested areas, GPS signals become unreliable or completely unavailable.
                        </p>
<p>
                            The core problem was to engineer a system that allows a UAV to maintain spatial awareness, avoid dynamic obstacles, and navigate to a target destination purely using onboard sensors without external communication dependencies.
                        </p>
</div>

</div>
<div>

<div class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Inference Latency</div>
</div>

<div class="space-y-8 font-body-lg text-body-lg text-text-main leading-relaxed">
<p>
                                We implemented a hybrid approach combining classic Simultaneous Localization and Mapping (SLAM) with advanced Deep Reinforcement Learning (DRL).
                            </p>
<ul class="space-y-6 list-none pl-0">
<li class="pl-6 border-l-2 border-secondary">
<strong>Visual Odometry:</strong> Utilizing stereoscopic cameras to estimate the UAV's trajectory by analyzing frame-to-frame changes in the environment.
                                </li>
<li class="pl-6 border-l-2 border-secondary">
<strong>Reinforcement Learning Policy:</strong> A neural network trained in simulated environments (Isaac Sim) to handle complex, dynamic obstacle avoidance.
                                </li>
<li class="pl-6 border-l-2 border-secondary">
<strong>Edge Computing:</strong> Optimized the models using TensorRT to run directly on an onboard Jetson Nano, ensuring low latency.
                                </li>

<script>
(function () {
  const USER = 'ugurhandasdemir';
  const params = new URLSearchParams(location.search);
  const slug = params.get('repo');
  const titleEl = document.getElementById('repo-title');
  const statusEl = document.getElementById('readme-status');
  const bodyEl = document.getElementById('readme');

  if (!slug) {
    titleEl.textContent = 'Proje secilmedi';
    statusEl.textContent = 'Gecerli bir proje secilmedi.';
    return;
  }

  function renderMarkdown(md, ghRepo) {
    statusEl.textContent = '';
    var html = window.marked
      ? marked.parse(md)
      : ('<pre>' + md.replace(/[&<>]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]; }) + '</pre>');
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    if (ghRepo) {
      // GitHub README: göreli yolları repo'ya göre mutlaklaştır.
      var rawBase = 'https://raw.githubusercontent.com/' + USER + '/' + ghRepo + '/HEAD/';
      var blobBase = 'https://github.com/' + USER + '/' + ghRepo + '/blob/HEAD/';
      tmp.querySelectorAll('img[src]').forEach(function (img) {
        var sv = img.getAttribute('src');
        if (sv && !/^https?:|^data:|^\/\//.test(sv)) img.setAttribute('src', rawBase + sv.replace(/^\.?\//, ''));
      });
      tmp.querySelectorAll('a[href]').forEach(function (a) {
        var h = a.getAttribute('href');
        if (h && !/^https?:|^#|^mailto:|^\/\//.test(h)) a.setAttribute('href', blobBase + h.replace(/^\.?\//, ''));
      });
    }
    // Yerel .md: göreli yollar zaten /static/... ile mutlak; dış linkleri yeni sekmede aç.
    tmp.querySelectorAll('a[href]').forEach(function (a) {
      var h = a.getAttribute('href') || '';
      if (/^https?:/.test(h)) { a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener'); }
    });
    bodyEl.innerHTML = tmp.innerHTML;
  }

  function fetchText(url, accept) {
    var opts = accept ? { headers: { 'Accept': accept } } : undefined;
    return fetch(url, opts).then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); });
  }

  function loadGithub(ghRepo) {
    return fetchText('https://api.github.com/repos/' + USER + '/' + encodeURIComponent(ghRepo) + '/readme', 'application/vnd.github.v3.raw')
      .then(function (md) { renderMarkdown(md, ghRepo); });
  }

  fetch('/repos.json', { cache: 'no-cache' })
    .then(function (r) { return r.ok ? r.json() : {}; })
    .catch(function () { return {}; })
    .then(function (data) {
      var manual = (data.manual || []).find(function (m) {
        return (m.slug && m.slug === slug) || m.name === slug || m.repo === slug;
      });
      var mdPath = manual && manual.details ? ('/' + String(manual.details).replace(/^\/+/, '')) : null;
      // Manual projede repo yok; düz repos[] girdisinde slug = repo adıdır.
      var ghRepo = manual ? (manual.repo || null) : slug;
      var title = manual ? manual.name : slug;
      titleEl.textContent = title;
      document.title = title + ' - Ugurhan Dasdemir';

      // Öncelik: yerel .md → GitHub README → kaynak yok.
      var local = mdPath ? fetchText(mdPath) : Promise.reject(new Error('no-local'));
      local
        .then(function (md) { renderMarkdown(md, null); })
        .catch(function () {
          if (!ghRepo) throw new Error('no-source');
          return loadGithub(ghRepo);
        })
        .catch(function (e) {
          if (e && e.message === 'no-source') {
            statusEl.textContent = 'Bu proje için detay sayfası bulunmuyor.';
          } else {
            statusEl.innerHTML = 'İçerik alınamadı (' + (e && e.message) + ').'
              + (ghRepo ? ' <a class="text-secondary underline" target="_blank" rel="noopener" href="https://github.com/' + USER + '/' + encodeURIComponent(ghRepo) + '">GitHub\'da aç</a>' : '');
          }
        });
    });
})();
</script>
